name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgres://test:test@localhost:5432/golradar2_test

jobs:
  lint-and-types:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  test:
    name: Tests (Bun)
    runs-on: ubuntu-latest
    needs: lint-and-types
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - run: bun test --coverage
        if: github.event_name == 'pull_request'

  python-sidecar:
    name: Python Trainer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: mini-services/ml-trainer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run pytest
        working-directory: mini-services/ml-trainer
        run: pytest tests/ -v

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-types, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}