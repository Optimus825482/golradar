# ── Optimus Gol Radari - Coolify Docker Compose ─────────────────
# Tüm servisler aynı stack içinde deploy edilir:
#   - PostgreSQL (veritabanı)
#   - Web App (Next.js)
#   - ML Trainer (XGBoost, isteğe bağlı)
#
# Domain: https://radar.erkanerdem.online

services:
  # ── PostgreSQL (Veritabanı) ──
  postgres:
    image: postgres:16-alpine
    container_name: golradar-db
    restart: unless-stopped
    volumes:
      - golradar_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golradar_secret}
      POSTGRES_DB: golradar_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d golradar_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - golradar-net

  # ── Ana Web Uygulaması (Next.js) ──
  golradar:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    container_name: golradar-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3012:3012"
    networks:
      - golradar-net
    # Traefik service port tanımı — olmazsa Coolify otomatik oluşturamıyor
    labels:
      traefik.http.services.golradar.loadbalancer.server.port: "3012"
      traefik.http.services.golradar.loadbalancer.server.scheme: "http"
    environment:
      # Database — PostgreSQL container'ına bağlanır
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-golradar_secret}@postgres:5432/golradar_db"

      # App Configuration
      NODE_ENV: "production"
      PORT: "3012"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_APP_URL: "https://radar.erkanerdem.online"

      # Goal Radar Configuration
      RADAR_THRESHOLD: "${RADAR_THRESHOLD:-65}"
      SIGNAL_5MIN_THRESHOLD: "${SIGNAL_5MIN_THRESHOLD:-0.25}"
      POISSON_BLEND_WEIGHT: "${POISSON_BLEND_WEIGHT:-0.25}"
      MAX_PRESSURE_SNAPSHOTS: "${MAX_PRESSURE_SNAPSHOTS:-540}"

      # API Timeouts (ms)
      NESINE_API_TIMEOUT: "${NESINE_API_TIMEOUT:-10000}"
      FOTMOB_API_TIMEOUT: "${FOTMOB_API_TIMEOUT:-10000}"
      GOALOO_API_TIMEOUT: "${GOALOO_API_TIMEOUT:-15000}"
      SCOREMER_API_TIMEOUT: "${SCOREMER_API_TIMEOUT:-15000}"

      # ML Trainer sidecar URL (Docker internal network)
      ML_TRAINER_URL: "http://ml-trainer:9100"

      # PWA
      NEXT_PUBLIC_PWA_THEME_COLOR: "${NEXT_PUBLIC_PWA_THEME_COLOR:-#10b981}"

      # Socket.IO (Nesine live relay) — aynı container içinde çalışır
      NESINE_LIVE_PORT: "3003"
      NEXT_PUBLIC_SOCKET_URL: "https://radar.erkanerdem.online:3003"
      SOCKET_CORS_ORIGIN: "https://radar.erkanerdem.online"

      # Admin CORS
      ALLOWED_ORIGINS: "radar.erkanerdem.online"

      # Destructive ops (varsayılan 0 — ilk kurulumda 1 yapılır)
      SIGNAL_RESET: "0"
      IMPORT_FOTMOB_TEAMS: "${IMPORT_FOTMOB_TEAMS:-0}"
    volumes:
      - golradar_ml_data:/app/data
    networks:
      - golradar-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3012/api >/dev/null 2>&1 || curl -sf http://localhost:3012/api >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── ML Trainer Sidecar (XGBoost) ──
  # Python ile XGBoost model eğitimi için.
  # Çalışmazsa uygulama built-in GBDT model ile devam eder.
  ml-trainer:
    build:
      context: ./mini-services/ml-trainer
      dockerfile: Dockerfile
    container_name: golradar-ml-trainer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ML_DATA_ROOT: /data
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-golradar_secret}@postgres:5432/golradar_db"
    volumes:
      - golradar_ml_data:/data
    networks:
      - golradar-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/healthz')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  golradar-net:
    driver: bridge

volumes:
  golradar_pgdata:
    name: golradar-pgdata
  golradar_ml_data:
    name: golradar-ml-data
