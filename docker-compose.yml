# ── docker-compose.yml ──
# Usage:
#   docker compose build
#   docker compose up -d
#
# Environment variables (.env file or Coolify env vars):
#   DATABASE_URL, NESINE_API_TIMEOUT, etc.

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: golradar-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golradar_secret}
      POSTGRES_DB: golradar_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d golradar_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - golradar-net
    ports:
      - "5432:5432"

  # ── Main Next.js App ──
  golradar-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golradar-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:golradar_secret@postgres:5432/golradar_db}
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NESINE_LIVE_PORT: 3003
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://golradar-nesine:3003}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://golradar-web:3000}
      NESINE_API_TIMEOUT: ${NESINE_API_TIMEOUT:-10000}
      FOTMOB_API_TIMEOUT: ${FOTMOB_API_TIMEOUT:-10000}
      GOALOO_API_TIMEOUT: ${GOALOO_API_TIMEOUT:-15000}
      SCOREMER_API_TIMEOUT: ${SCOREMER_API_TIMEOUT:-15000}
      RADAR_THRESHOLD: ${RADAR_THRESHOLD:-65}
      SIGNAL_5MIN_THRESHOLD: ${SIGNAL_5MIN_THRESHOLD:-0.25}
      POISSON_BLEND_WEIGHT: ${POISSON_BLEND_WEIGHT:-0.25}
      MAX_PRESSURE_SNAPSHOTS: ${MAX_PRESSURE_SNAPSHOTS:-540}
      NEXT_PUBLIC_PWA_THEME_COLOR: ${NEXT_PUBLIC_PWA_THEME_COLOR:-#10b981}
    networks:
      - golradar-net
    ports:
      - "3000:3000"

  # ── Nesine WebSocket Relay ──
  golradar-nesine:
    build:
      context: .
      dockerfile: mini-services/nesine-live/Dockerfile
    container_name: golradar-nesine
    restart: unless-stopped
    environment:
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://golradar-web:3000}
    networks:
      - golradar-net
    ports:
      - "3003:3003"

networks:
  golradar-net:
    driver: bridge

volumes:
  postgres_data:
