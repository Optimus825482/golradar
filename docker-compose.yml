services:
  golradar:
    build: .
    container_name: golradar
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3003:3003"
    environment:
      # PostgreSQL (bundled, internal)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golradar_secret}
      # Next.js / App
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-golradar_secret}@localhost:5432/golradar_db"
      # Radar config
      RADAR_THRESHOLD: ${RADAR_THRESHOLD:-65}
      SIGNAL_5MIN_THRESHOLD: ${SIGNAL_5MIN_THRESHOLD:-0.25}
      POISSON_BLEND_WEIGHT: ${POISSON_BLEND_WEIGHT:-0.25}
      MAX_PRESSURE_SNAPSHOTS: ${MAX_PRESSURE_SNAPSHOTS:-540}
      # API timeouts
      NESINE_API_TIMEOUT: ${NESINE_API_TIMEOUT:-10000}
      FOTMOB_API_TIMEOUT: ${FOTMOB_API_TIMEOUT:-10000}
      GOALOO_API_TIMEOUT: ${GOALOO_API_TIMEOUT:-15000}
      SCOREMER_API_TIMEOUT: ${SCOREMER_API_TIMEOUT:-15000}
      # Socket.IO / Nesine relay
      NESINE_LIVE_PORT: 3003
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3003}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:3000}
      # PWA
      NEXT_PUBLIC_PWA_THEME_COLOR: ${NEXT_PUBLIC_PWA_THEME_COLOR:-#10b981}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  # ML Trainer (opt-in via --profile ml)
  # FastAPI sidecar for XGBoost + Kalman training jobs. Off by
  # default — the TS runtime trains via shipped JSON artifacts.
  # Bring up with: docker compose --profile ml up
  ml-trainer:
    build:
      context: .
      dockerfile: mini-services/ml-trainer/Dockerfile
    container_name: golradar-ml-trainer
    restart: "no"
    profiles: ["ml"]
    environment:
      ML_DATA_ROOT: /data
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-golradar_secret}@postgres:5432/golradar_db
    volumes:
      - golradar_ml_data:/data
    networks:
      - golradar-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/healthz')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  golradar_ml_data:
