[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    unit: Unit tests (pure functions, no IO)
    integration: Tests requiring fixtures or HTTP calls
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:statsbombpy
    ignore::DeprecationWarning:sklearn