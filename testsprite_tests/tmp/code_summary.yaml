version: "2"
type: frontend
tech_stack:
  - Next.js 16 (App Router, standalone output)
  - React 19
  - TypeScript
  - Tailwind CSS v4
  - shadcn/ui (Radix primitives)
  - Prisma 6 + PostgreSQL
  - Bun runtime
  - Socket.IO
  - Playwright
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Home/landing page
  - path: /admin
    file: src/app/admin/page.tsx
    auth_required: true
    description: Admin dashboard root with nav cards
  - path: /admin/algorithm
    file: src/app/admin/algorithm/page.tsx
    auth_required: true
    description: Algorithm configuration page
  - path: /admin/calibration
    file: src/app/admin/calibration/page.tsx
    auth_required: true
    description: Model calibration page
  - path: /admin/elo
    file: src/app/admin/elo/page.tsx
    auth_required: true
    description: Elo ratings admin page
  - path: /admin/ml
    file: src/app/admin/ml/page.tsx
    auth_required: true
    description: ML pipeline overview
  - path: /admin/ml/backtest
    file: src/app/admin/ml/backtest/page.tsx
    auth_required: true
    description: ML backtest results viewer
  - path: /admin/ml/monitoring
    file: src/app/admin/ml/monitoring/page.tsx
    auth_required: true
    description: ML model monitoring
  - path: /admin/ml/train
    file: src/app/admin/ml/train/page.tsx
    auth_required: true
    description: ML training trigger UI
  - path: /admin/signals
    file: src/app/admin/signals/page.tsx
    auth_required: true
    description: Signals dashboard
  - path: /admin/signals/backtest
    file: src/app/admin/signals/backtest/page.tsx
    auth_required: true
    description: Signals backtest viewer
features:
  - name: Admin Login
    description: PBKDF2-hashed admin auth with session tokens
    files:
      - src/app/api/admin/auth/route.ts
      - src/lib/auth.ts
    entry_route: /admin
    user_interactions:
      - Navigate to /admin
      - Enter username + password
      - Click login
      - Receive session token (cookie admin_token or Bearer header)
    api_calls:
      - method: POST
        endpoint: /api/admin/auth
      - method: GET
        endpoint: /api/admin/auth?action=check
    auth_required: false
  - name: Admin Dashboard Navigation
    description: Sidebar/topbar nav across 11 admin pages
    files:
      - src/app/admin/layout.tsx
      - src/app/admin/page.tsx
    entry_route: /admin
    user_interactions:
      - Login redirect to /admin
      - Click nav link to sub-page
    api_calls: []
    auth_required: true
  - name: ML Training Pipeline
    description: Schedule + trigger ML training jobs with horizon export
    files:
      - src/app/api/admin/ml/train/route.ts
      - src/app/admin/ml/train/page.tsx
    entry_route: /admin/ml/train
    user_interactions:
      - View training status
      - Trigger training run
    api_calls:
      - method: POST
        endpoint: /api/admin/ml/train
      - method: GET
        endpoint: /api/admin/ml/status
    auth_required: true
  - name: Signals Backtest
    description: View historical signal performance
    files:
      - src/app/api/admin/signals/backtest/route.ts
      - src/app/admin/signals/backtest/page.tsx
    entry_route: /admin/signals/backtest
    user_interactions:
      - View backtest tables
      - Filter by date/horizon
    api_calls:
      - method: GET
        endpoint: /api/admin/signals/backtest
    auth_required: true
known_limitations:
  - issue: ML in-play retrain skipped at boot (ML_TRAINER_URL not set)
    location: server startup logs
    impact: In-play ML scheduler disabled; only 5/10/15-min horizon exports run
  - issue: TestSprite MCP bootstrap times out on this project
    location: .testsprite/config.json missing
    impact: Plan generation forced via manual YAML + CLI fallback
  - issue: Admin user requires password change on first login (mustChange=true)
    location: src/app/api/admin/auth/route.ts
    impact: Login flow must handle post-login redirect to change-password
